<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-window { position: fixed; bottom: 90px; right: 20px; width: 360px; max-width: calc(100vw - 40px); z-index: 100; }
        @media (max-width: 640px) { .chat-window { right: 10px; left: 10px; width: auto; } }
    </style>
</head>
<body class="bg-transparent">
<div id="aussiepaw-chat" class="chat-window hidden">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden border">
        <div class="bg-amber-600 text-white px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-comments"></i>
                <span class="font-semibold">AussiePaw Assistant</span>
            </div>
            <button id="chatCloseBtn" class="hover:opacity-80">✕</button>
        </div>
        <div id="chatMessages" class="h-80 overflow-auto p-4 space-y-3 bg-gray-50"></div>
        <div id="chatTyping" class="px-4 pb-2 text-sm text-gray-500 hidden">Assistant is typing...</div>
        <form id="chatForm" class="flex items-center gap-2 p-3 bg-white border-t">
            <input id="chatInput" type="text" placeholder="Ask about breeds, locations, prices..." class="flex-1 px-3 py-2 border rounded-xl" required>
            <button type="submit" class="bg-amber-600 text-white px-4 py-2 rounded-xl">Send</button>
        </form>
    </div>
</div>

<script>
// The following script expects to run when injected into the main page.
(function(){
  if (window.AussiePawChatInitialized) return; // prevent double init
  window.AussiePawChatInitialized = true;

  const container = document.getElementById('aussiepaw-chat');
  const messagesEl = document.getElementById('chatMessages');
  const typingEl = document.getElementById('chatTyping');
  const form = document.getElementById('chatForm');
  const input = document.getElementById('chatInput');
  const closeBtn = document.getElementById('chatCloseBtn');

  function show(){ container.classList.remove('hidden'); autoScroll(); }
  function hide(){ container.classList.add('hidden'); }
  function autoScroll(){ setTimeout(()=>{ messagesEl.scrollTop = messagesEl.scrollHeight; }, 0); }

  function addMsg(text, from){
    const wrap = document.createElement('div');
    const base = 'max-w-[80%] px-3 py-2 rounded-2xl shadow';
    if(from==='user'){
      wrap.className = 'flex justify-end';
      wrap.innerHTML = `<div class="${base} bg-amber-600 text-white">${text}</div>`;
    } else {
      wrap.className = 'flex justify-start';
      wrap.innerHTML = `<div class="${base} bg-white">${text}</div>`;
    }
    messagesEl.appendChild(wrap); autoScroll();
  }

  async function send(text){
    addMsg(text, 'user');
    typingEl.classList.remove('hidden');
    try{
      const res = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text }) });
      const data = await res.json();
      addMsg(data.text, 'bot');
    } catch (e){
      addMsg('Sorry, something went wrong. Please try again.', 'bot');
    } finally {
      typingEl.classList.add('hidden');
    }
  }

  form.addEventListener('submit', (e)=>{
    e.preventDefault();
    const text = input.value.trim(); if(!text) return; input.value='';
    send(text);
  });
  closeBtn.addEventListener('click', hide);

  // Greet on first open
  if (!window._aussiepawGreeted) {
    window._aussiepawGreeted = true;
    addMsg('Hello! How can I help you find the perfect puppy today?', 'bot');
  }

  // expose controls
  window.AussiePawChat = { show, hide };
})();
</script>
</body>
</html>
